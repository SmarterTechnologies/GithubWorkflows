name: Deploy preview to Firebase Hosting
on:
  workflow_call:
    inputs:
      project-id:
        description: "The project ID used in the Firebase project"
        required: true
        type: string
      channel:
        description: "The channel to deploy to"
        required: false
        type: string
      expires:
        description: "The time at which the preview expires"
        required: false
        type: string
        default: "3d"
    secrets:
      service-account:
        required: true

jobs:
  deploy_live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master

        # Download build artifact
      - name: Download build output from artifacts
        id: build-folder
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist

      # Firebase deploy
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.service-account }}"
          projectId: ${{ inputs.project-id }}
          channelId: ${{ inputs.channel }}
