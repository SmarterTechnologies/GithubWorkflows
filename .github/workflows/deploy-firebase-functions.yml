name: Deploy to Firebase Functions
on:
  workflow_call:
    inputs:
      project-id:
        description: "The project ID used in the Firebase project"
        required: true
        type: string
    secrets:
      firebase-token:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master

        # Download build artifact
      - name: Download build output from artifacts
        id: build-folder
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist

        # Deploy to Firebase
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --project ${{ secrets.project-id }}
        env:
          FIREBASE_TOKEN: ${{ secrets.firebase-token }}
